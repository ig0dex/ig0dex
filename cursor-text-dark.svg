<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 30" width="560" height="30">
  <style>
    .cursor {
      animation: blink 1s step-end infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }
  </style>
  <rect width="560" height="30" fill="none"/>
  <rect x="0" y="5" width="11" height="18" fill="#ffffff" class="cursor"/>
  <text x="18" y="21" font-family="'Courier New', Courier, monospace" font-size="15" fill="#ffffff">architecture first | implementation second | zero failures</text>
</svg>
